<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97757"/>
      <stop offset="100%" style="stop-color:#C96442"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#g)"/>
  <!-- Claude asterisk/star shape -->
  <g transform="translate(50,50)" fill="white">
    <!-- Vertical bar -->
    <rect x="-7" y="-32" width="14" height="64" rx="7"/>
    <!-- Horizontal bar -->
    <rect x="-32" y="-7" width="64" height="14" rx="7"/>
    <!-- Diagonal 1 -->
    <rect x="-7" y="-32" width="14" height="64" rx="7" transform="rotate(60)"/>
    <!-- Diagonal 2 -->
    <rect x="-7" y="-32" width="14" height="64" rx="7" transform="rotate(120)"/>
  </g>
</svg>
